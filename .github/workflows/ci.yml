name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        run: python -m pip install uv==0.9.14

      - name: Check lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint
        run: make lint

      - name: Test
        run: make test
